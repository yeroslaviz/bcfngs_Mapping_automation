genomes_root: /fs/pool/pool-bcfngs/genomes

# Pinned releases (bumpable).
releases:
  ensembl: 115
  ensemblgenomes:
    metazoa: 62

default_threads: 16
default_ram_bytes: 168632718037
bwa_index_algorithm: is
bwa_index_mem_mb: 16000

# Versions are used for versioned output directories (and symlink targets).
index_versions:
  star: "2.7.11b"
  bwa: "0.7.18"
  bowtie2: "2.5.4"

organisms:
  Homo_sapiens:
    source: ensembl
    species: homo_sapiens
    assembly: GRCh38
